<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور | CareFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="container">
    <div class="card auth-card">
        <div class="logo-area">
            <i class="fas fa-heartbeat"></i>
            <span>CareFlow</span>
        </div>
        <h2><i class="fas fa-key"></i> نسيت كلمة المرور؟</h2>
        <p>يرجى إدخال البيانات المطلوبة بعناية</p>
        
        <div id="alertMessage"></div>
        
        <div class="auth-input">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="resetEmail" placeholder="example@email.com">
            <!-- إضافة رابط إرسال الكود ليعمل مع الـ Backend -->
            <small style="display: block; text-align: left; margin-top: 5px;">
                <a href="#" id="sendOtpBtn" style="color: #00bcc2; text-decoration: none; font-size: 13px;">أرسل رمز التحقق (OTP)</a>
            </small>
        </div>

        <div class="auth-input">
            <label><i class="fas fa-shield-alt"></i> رمز التحقق (OTP)</label>
            <input type="text" id="resetOtp" placeholder="أدخل الرمز">
        </div>

        <div class="auth-input">
            <label><i class="fas fa-lock"></i> كلمة المرور الجديدة</label>
            <input type="password" id="resetPassword" placeholder="********">
        </div>

        <div class="auth-input">
            <label><i class="fas fa-lock"></i> تأكيد كلمة المرور</label>
            <input type="password" id="resetConfirmPassword" placeholder="********">
        </div>
        
        <button type="button" class="btn" id="submitReset" style="background:#ff9800;">
            <i class="fas fa-sync-alt"></i> إعادة تعيين كلمة المرور
        </button>
                    
        <div class="auth-links" style="justify-content: center; margin-top: 15px;">
            <a href="Login.html"><i class="fas fa-arrow-right"></i> تذكرت كلمة المرور؟ سجل دخول</a>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
    const alertDiv = document.getElementById('alertMessage');

    // 1. ربط زر "أرسل رمز التحقق" بالـ Backend (دالة forgotPassword)
    document.getElementById('sendOtpBtn').addEventListener('click', async function(e) {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();

        if (!email) {
            alertDiv.innerHTML = `<div class="alert alert-error">⚠️ يرجى إدخال البريد الإلكتروني أولاً</div>`;
            return;
        }

        try {
            alertDiv.innerHTML = `<div class="alert alert-info">جاري إرسال الرمز...</div>`;
            const success = await forgotPassword(email);
            if (success) {
                alertDiv.innerHTML = `<div class="alert alert-success">✅ تم إرسال الرمز إلى بريدك الإلكتروني</div>`;
            }
        } catch (error) {
            alertDiv.innerHTML = `<div class="alert alert-error">❌ حدث خطأ أثناء إرسال الرمز</div>`;
        }
    });

    // 2. ربط زر "إعادة تعيين كلمة المرور" بالـ Backend (دالة resetPassword)
    document.getElementById('submitReset').addEventListener('click', async function(e) {
        e.preventDefault();

        const email = document.getElementById('resetEmail').value.trim();
        const otp = document.getElementById('resetOtp').value.trim();
        const newPassword = document.getElementById('resetPassword').value;
        const confirmPassword = document.getElementById('resetConfirmPassword').value;

        if (!email || !otp || !newPassword || !confirmPassword) {
            alertDiv.innerHTML = `<div class="alert alert-error">⚠️ يرجى ملء جميع البيانات</div>`;
            return;
        }

        if (newPassword !== confirmPassword) {
            alertDiv.innerHTML = `<div class="alert alert-error">⚠️ كلمتا المرور غير متطابقتين</div>`;
            return;
        }

        try {
            alertDiv.innerHTML = `<div class="alert alert-info">جاري التحقق وتغيير كلمة المرور...</div>`;
            // استدعاء الدالة من ملف script.js
            await resetPassword(email, otp, newPassword);
        } catch (error) {
            console.error(error);
            alertDiv.innerHTML = `<div class="alert alert-error">❌ فشل الاتصال بالسيرفر</div>`;
        }
    });
</script>
</body>
</html>
