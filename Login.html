<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | CareFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="container">
    <div class="card auth-card">
        <div class="logo-area">
            <i class="fas fa-heartbeat"></i>
            <span>CareFlow</span>
        </div>
        <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
        <p>مرحباً بك! يرجى إدخال بياناتك</p>
        
        <div id="alertMessage"></div>
        
        <div class="auth-input">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="loginEmail" placeholder="example@email.com" >
        </div>
        <div class="auth-input">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="********" >
        </div>
        
        <button class="btn" onclick="handleLogin()"><i class="fas fa-arrow-left"></i> دخول</button>
        
        <div class="auth-links">
            <a href="forget-password.html"><i class="fas fa-question-circle"></i> نسيت كلمة المرور؟</a>
            <a href="signup.html"><i class="fas fa-user-plus"></i> إنشاء حساب جديد</a>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
    async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const alertDiv = document.getElementById('alertMessage');
    
    // التحقق من الحقول
    if (!email || !password) {
        alertDiv.innerHTML = `<div class="alert alert-error">يرجى إدخال البيانات</div>`;
        return;
    }

    try {
        alertDiv.innerHTML = `<div class="alert alert-info">جاري التحقق...</div>`;
        
        // استدعاء الدالة من ملف script.js
        const result = await loginUser(email, password); 
        
        if (result.success) {
            alertDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
            
            // التوجيه إلى الملف الشخصي بعد حفظ المعرف
            setTimeout(() => { 
                window.location.href = 'profile.html'; 
            }, 800);
        } else {
            // في حالة كانت البيانات خاطئة (مثل الصور التي أرفقتها سابقاً)
            alertDiv.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
        }
    } catch (error) {
        alertDiv.innerHTML = `<div class="alert alert-error">حدث خطأ تقني في الاتصال بالسيرفر</div>`;
    }
}
</script>
</body>
</html>
