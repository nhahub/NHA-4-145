<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواعيدي | CareFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
    <style>
        .appointment-item {
            background: #fff;
            border-right: 5px solid #1f5068;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .appointment-info h4 { margin: 0 0 5px 0; color: #1f5068; }
        .appointment-info p { margin: 2px 0; font-size: 0.9rem; color: #555; }
        .btn-outline:hover { background-color: #ffeaea; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo-area">
        <i class="fas fa-heartbeat" style="color: #1f5068;"></i>
        <span>CareFlow | تدفق الرعاية</span>
    </div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="notifications page.html"><i class="fas fa-bell"></i> الإشعارات</a>
        <a href="profile.html"><i class="fas fa-user"></i> الملف الشخصي</a>
        <a href="my appointments page.html" class="active"><i class="fas fa-calendar-check"></i> مواعيدي</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-calendar-alt"></i> مواعيدي الطبية</h2>
        <p>هنا تجد جميع مواعيدك المسجلة، مع إمكانية إضافة مواعيد جديدة أو إلغاء الحجز.</p>
        
        <button class="btn" style="margin: 20px 0 15px 0;" onclick="window.location.href='book-appointment.html'">
            <i class="fas fa-plus"></i> + حجز موعد جديد
        </button>
        
        <div id="appointmentsContainer">
            <p style="text-align: center; color: #888; padding: 20px;">جاري تحميل مواعيدك...</p>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
    window.onload = function() {
        displayUserAppointments();
    };

    async function displayUserAppointments() {
        const container = document.getElementById('appointmentsContainer');
        const patientId = localStorage.getItem("patientId"); 

        if (!patientId) {
            container.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <p style="color: #e74c3c;">يجب تسجيل الدخول أولاً لعرض المواعيد.</p>
                    <a href="Login.html" class="btn" style="display: inline-block; margin-top: 10px; text-decoration: none;">انتقل لصفحة الدخول</a>
                </div>`;
            return;
        }

        try {
            const response = await fetch(`${BASE_URL}/api/Appointments/my-appointments/${patientId}`);
            if (!response.ok) throw new Error("فشل جلب البيانات");

            const appointments = await response.json();
            
            if (appointments && appointments.length > 0) {
                container.innerHTML = ''; 
                appointments.forEach(app => {
                    const appDiv = document.createElement('div');
                    appDiv.className = 'appointment-item';
                    
                    const hName = app.hospitalName || 'غير محدد';
                    const mName = app.medicineName || 'غير محدد';
                    const aDate = app.formattedDate || 'غير محدد';
                    const aTime = app.formattedTime || 'غير محدد';
                    const dLabel = app.dayLabel ? `(${app.dayLabel})` : ''; 
                    const appId = app.id;

                    appDiv.innerHTML = `
                        <div class="appointment-info">
                            <h4><i class="fas fa-hospital"></i> المستشفى: ${hName}</h4>
                            <p><i class="fas fa-capsules"></i> الدواء: ${mName}</p>
                            <p><i class="fas fa-calendar-day"></i> التاريخ: ${aDate} ${dLabel}</p>
                            <p><i class="fas fa-clock"></i> الوقت: ${aTime}</p>
                            <p><i class="fas fa-info-circle"></i> الحالة: <span style="color: #f39c12;">${app.status || 'معلق'}</span></p>
                        </div>
                        <button class="btn btn-outline" style="color: #e74c3c; border: 1px solid #e74c3c; background: transparent; padding: 8px 15px; border-radius: 5px; cursor: pointer;" 
                                onclick="cancelAppointment('${appId}')">
                            إلغاء الحجز
                        </button>
                    `;
                    container.appendChild(appDiv);
                });
            } else {
                container.innerHTML = `
                    <div style="text-align: center; color: #888; padding: 40px;">
                        <i class="fas fa-calendar-times" style="font-size: 3rem; margin-bottom: 10px;"></i>
                        <p>لا توجد مواعيد مسجلة حالياً.</p>
                    </div>`;
            }
        } catch (error) {
            console.error("Fetch error:", error);
            container.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">حدث خطأ في الاتصال بالسيرفر.</p>';
        }
    }
</script>

</body>
</html>
