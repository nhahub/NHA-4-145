<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص الدواء | CareFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ربط الملف الأصلي بعد التعديل -->
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<!-- الـ Navbar الموحد من الـ CSS الجديد -->
<div class="navbar">
    <div class="logo-area">
        <i class="fas fa-heartbeat"></i>
        <span>CareFlow | تدفق الرعاية</span>
    </div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="notifications page.html"><i class="fas fa-bell"></i> الإشعارات</a>
        <a href="profile.html"><i class="fas fa-user"></i> الملف الشخصي</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-pills"></i> فحص الدواء</h2>
        <p style="margin-bottom: 10px; color: #666; font-size: 14px;">ابحث عن توافر الدواء في جميع المستشفيات</p>
        
        <label>اسم الدواء</label>
        <input type="text" id="medicineNameInput" maxlength="30" placeholder="ابحث عن دواء معين..." onkeyup="searchMedication()">

        <button class="btn" onclick="searchMedication()">
            <i class="fas fa-search"></i> بحث
        </button>
    </div>

    <div class="card">
        <h3>الأدوية المتاحة</h3>
        <table id="medicationTable">
            <thead>
                <tr>
                    <th>الدواء</th>
                    <th>الحالة</th>
                    <th>التاريخ المتوقع</th>
                </tr>
            </thead>
            <tbody id="medicationBody">
                <tr>
                    <td colspan="3" style="text-align:center;">جاري تحميل البيانات...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
<script>
    window.onload = function() {
        if(typeof fetchAllMedicines === "function") fetchAllMedicines();
    };

    function searchMedication() {
        const input = document.getElementById('medicineNameInput').value.toLowerCase();
        const rows = document.querySelectorAll('#medicationBody tr');
        rows.forEach(row => {
            if (row.cells.length > 1) {
                const medName = row.cells[0].innerText.toLowerCase();
                row.style.display = medName.includes(input) ? "" : "none";
            }
        });
    }
</script>
</body>
</html>
