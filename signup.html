<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | CareFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="container">
    <div class="card auth-card">
        <div class="logo-area">
            <i class="fas fa-heartbeat"></i>
            <span>CareFlow</span>
        </div>
        <h2><i class="fas fa-user-plus"></i> إنشاء حساب جديد</h2>
        <p>سجل الآن للاستفادة من خدماتنا</p>
        
        <div id="alertMessage"></div>
        
        <div class="auth-input">
            <label><i class="fas fa-user"></i> الاسم الكامل</label>
            <input type="text" id="signupName" placeholder="أحمد محمد">
        </div>

        <div class="auth-input">
            <label><i class="fas fa-phone"></i> رقم الهاتف</label>
            <input type="text" id="signupPhone" placeholder="01xxxxxxxxx">
        </div>

        <div class="auth-input">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="signupEmail" placeholder="example@email.com">
        </div>
        <div class="auth-input">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" id="signupPassword" placeholder="******** (6 أحرف على الأقل)">
        </div>
        <div class="auth-input">
            <label><i class="fas fa-lock"></i> تأكيد كلمة المرور</label>
            <input type="password" id="signupConfirmPassword" placeholder="********">
        </div>
        
        <button class="btn" onclick="handleSignup()"><i class="fas fa-check"></i> إنشاء حساب</button>
        
        <div class="auth-links" style="justify-content: center;">
            <a href="Login.html"><i class="fas fa-arrow-right"></i> لديك حساب بالفعل؟ سجل دخول</a>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
    // جعل الدالة async لتنتظر الرد من السيرفر
    async function handleSignup() {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const phone = document.getElementById('signupPhone').value.trim(); // سحب قيمة الهاتف
        const password = document.getElementById('signupPassword').value;
        const confirmPassword = document.getElementById('signupConfirmPassword').value;
        const alertDiv = document.getElementById('alertMessage');
        
        // فحص بسيط قبل الإرسال
        if (!name || !email || !phone || !password || !confirmPassword) {
            alertDiv.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-triangle"></i> يرجى ملء كافة الحقول</div>`;
            return;
        }

        try {
            alertDiv.innerHTML = `<div class="alert alert-info">جاري إنشاء الحساب...</div>`;

            // استدعاء الدالة من script.js (تأكد من ترتيب البارامترات في ملفك)
            // الترتيب المتوقع: signupUser(username, email, password, confirmPassword, phone)
            const result = await signupUser(name, email, password, confirmPassword, phone);
            
            if (result.success) {
                alertDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${result.message}</div>`;
                setTimeout(() => {
                    window.location.href = 'Login.html';
                }, 1500);
            } else {
                alertDiv.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-triangle"></i> ${result.message}</div>`;
            }
        } catch (error) {
            alertDiv.innerHTML = `<div class="alert alert-error"><i class="fas fa-wifi"></i> فشل الاتصال بالسيرفر</div>`;
        }
    }
</script>
</body>
</html>
