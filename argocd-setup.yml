---
- name: "Deploy ArgoCD for GitOps"
  hosts: masters
  become: yes
  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf

  # نضع المتغيرات هنا ليراها الـ Playbook بالكامل
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: "Create argocd namespace"
      shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

    - name: "Add and update ArgoCD Helm repository"
      shell: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update

    - name: "Install/Upgrade ArgoCD using Helm"
      shell: |
        helm upgrade --install argocd argo/argo-cd \
          -n argocd \
          --set configs.secret.argocdServerAdminPassword='admin' \
          --wait --timeout 10m
      retries: 3
      delay: 10

    - name: "Wait for ArgoCD server to be ready"
      shell: |
        kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=argocd-server \
          -n argocd \
          --timeout=300s
      ignore_errors: yes

    - name: "Create Smart Meds ArgoCD Application manifest"
      copy:
        dest: /tmp/smart-meds-app.yaml
        content: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: smart-meds
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/nhahub/NHA-4-145.git
              targetRevision: main
              path: helm/smart-meds
            destination:
              server: https://kubernetes.default.svc
              namespace: smart-meds
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
              - CreateNamespace=true

    - name: "Apply Smart Meds Application to ArgoCD"
      shell: kubectl apply -f /tmp/smart-meds-app.yaml

    - name: "Display and Register ArgoCD status"
      shell: |
        echo "=== Status ==="
        kubectl get pods -n argocd
        echo "=== Apps ==="
        kubectl get applications -n argocd
      register: argocd_status

    - name: "Print ArgoCD status to console"
      debug:
        msg: "{{ argocd_status.stdout_lines }}"
