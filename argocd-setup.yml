---
- name: "Deploy ArgoCD for GitOps (EC2 Optimized - Production Ready)"
  hosts: masters
  become: yes
  vars:
    kubeconfig_path: /home/ec2-user/.kube/config
    argocd_version: "7.7.0"

  tasks:
    - name: "Add ArgoCD Helm repository safely"
      ansible.builtin.shell: |
        helm repo add argo https://argoproj.github.io/argo-helm || true
        helm repo update
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin:{{ ansible_env.PATH }}"
        KUBECONFIG: "{{ kubeconfig_path }}"
      become_user: ec2-user
      register: helm_repo_result
      until: helm_repo_result.rc == 0
      retries: 3
      delay: 10

    - name: "Install/Upgrade ArgoCD using Helm CLI (With Auto-Namespace)"
      ansible.builtin.shell: |
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd \
          --create-namespace \
          --version "{{ argocd_version }}" \
          --wait \
          --timeout 10m
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin:{{ ansible_env.PATH }}"
        KUBECONFIG: "{{ kubeconfig_path }}"
      become_user: ec2-user
      register: helm_install_result
      until: helm_install_result.rc == 0
      retries: 3
      delay: 15

    - name: "Wait until ArgoCD Application CRD exists in API Server"
      ansible.builtin.command:
        cmd: kubectl get crd applications.argoproj.io
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin:{{ ansible_env.PATH }}"
        KUBECONFIG: "{{ kubeconfig_path }}"
      become_user: ec2-user
      register: crd_check
      retries: 20
      delay: 5
      until: crd_check.rc == 0
      changed_when: false

    - name: "Wait for ArgoCD deployments rollout (Rock-Solid Rollout Check)"
      ansible.builtin.command:
        cmd: >
          kubectl rollout status deployment/{{ item }}
          -n argocd
          --timeout=300s
      loop:
        - argocd-server
        - argocd-repo-server
        - argocd-application-controller
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin:{{ ansible_env.PATH }}"
        KUBECONFIG: "{{ kubeconfig_path }}"
      become_user: ec2-user
      changed_when: false

    - name: "Deploy Smart Meds ArgoCD Application via Manifest"
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind:
