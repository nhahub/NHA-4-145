---
- name: "Kubernetes Cluster Setup (All Nodes)"
  hosts: kubernetes
  gather_facts: yes
  become: yes
  vars:
    ansible_ssh_private_key_file: /home/ec2-user/my_new_key.pem
  tasks:
    - name: "Update system packages"
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: "Install required packages"
      dnf:
        name:
          - curl
          - wget
          - git
          - vim
          - net-tools
          - python3-pip
          - iproute-tc
          - dnf-plugins-core
        state: present

    - name: "Disable SELinux and Firewalld settings"
      selinux:
        policy: targeted
        state: permissive

    - name: "Disable Swap"
      shell: |
        swapoff -a
        sed -i '/ swap / s/^/#/' /etc/fstab
      ignore_errors: yes

    - name: "Add Docker repository"
      command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: "Install Docker"
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: "Start Docker"
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: "Install Kubernetes tools"
      dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: "Enable Kubelet"
      systemd:
        name: kubelet
        enabled: yes
        state: started

- name: "Initialize Kubernetes Master"
  hosts: masters
  gather_facts: yes
  become: yes
  vars:
    ansible_ssh_private_key_file: /home/ec2-user/my_new_key.pem
  tasks:
    - name: "Initialize cluster"
      shell: kubeadm init --pod-network-cidr=10.244.0.0/16 --ignore-preflight-errors=NumCPU,Mem
      args:
        creates: /etc/kubernetes/admin.conf

    - name: "Create .kube directory"
      file:
        path: /root/.kube
        state: directory
        mode: '0755'

    - name: "Copy admin kubeconfig"
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        owner: root
        group: root
        mode: '0600'

    - name: "Generate join command"
      shell: kubeadm token create --print-join-command
      register: kubeadm_join_cmd

- name: "Join Worker Nodes to Cluster"
  hosts: workers
  gather_facts: yes
  become: yes
  vars:
    ansible_ssh_private_key_file: /home/ec2-user/my_new_key.pem
  tasks:
    - name: "Join node"
      shell: "{{ hostvars[groups['masters'][0]]['kubeadm_join_cmd']['stdout'] }}"
      ignore_errors: yes

- name: "Setup Jenkins Node"
  hosts: jenkins
  gather_facts: yes
  become: yes
  vars:
    ansible_ssh_private_key_file: /home/ec2-user/my_new_key.pem
  tasks:
    - name: "Install Java for Jenkins"
      dnf:
        name: java-17-openjdk
        state: present
