<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي | CareFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <div class="sidebar-navbar">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i> الملف الشخصي</a>
        <a href="my appointments page.html"><i class="fas fa-calendar-check"></i> مواعيدي</a>
        <a href="notifications page.html"><i class="fas fa-bell"></i> الإشعارات</a>
        <a href="check-medication.html"><i class="fas fa-pills"></i> فحص الدواء</a>
        <a href="book-appointment.html"><i class="fas fa-calendar-plus"></i> حجز موعد</a>
    </div>

    <div class="container">

        <!-- بطاقة عرض البيانات -->
        <div class="card profile-card" id="viewCard">
            <h2>👤 الملف الشخصي للمريض</h2>
            <div class="profile-top">
                <!-- تم تصحيح المسار ليطابق اسم الملف Profile-Page.png -->
                <img src="images/Profile-Page.png" id="profileImage" class="profile-img">
                <div class="profile-title">
                    <h3 id="vName">جاري التحميل...</h3>
                    <p class="muted">مريض مسجل في النظام</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <span>السن</span>
                    <strong id="vAge">--</strong>
                </div>
                <div class="info-box">
                    <span>النوع</span>
                    <strong id="vGender">--</strong>
                </div>
                <div class="info-box">
                    <span>المرض المزمن</span>
                    <strong id="vDisease">--</strong>
                </div>
                <div class="info-box full">
                    <span>المستشفى</span>
                    <strong id="vHospital">--</strong>
                </div>
            </div>

            <button class="btn full-btn" onclick="toggleEdit(true)">
                ✏️ تعديل البيانات
            </button>
        </div>

        <!-- بطاقة تعديل البيانات -->
        <div class="card" id="editCard" style="display:none;">
            <h2>تعديل البيانات</h2>

            <div class="image-upload-wrapper">
                <div class="avatar-container">
                    <!-- تم تصحيح المسار ليطابق اسم الملف Profile-Page.png -->
                    <img src="images/Profile-Page.png" id="editProfileImage" class="profile-img">
                    <label for="editImageUpload" class="upload-overlay">📷</label>
                    <input type="file" id="editImageUpload" accept="image/*">
                </div>
                <p class="upload-text">اضغط على الصورة لتغييرها</p>
            </div>

            <label>الاسم</label>
            <input type="text" id="eName">

            <label>السن</label>
            <input type="number" id="eAge">

            <label>النوع</label>
            <select id="eGender">
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>

            <label>المرض المزمن</label>
            <input type="text" id="eDisease">

            <label>المستشفى</label>
            <input type="text" id="eHospital">

            <button class="btn" onclick="saveProfile()">💾 حفظ</button>
            <button class="btn cancel" onclick="toggleEdit(false)">❌ إلغاء</button>
        </div>

        <!-- سجل المريض الديناميكي -->
        <div class="card">
            <h3>📋 سجل المريض</h3>
            <table>
                <thead>
                    <tr>
                        <th>الدواء</th>
                        <th>التاريخ</th>
                        <th>المستشفى</th>
                    </tr>
                </thead>
                <tbody id="patientHistoryBody">
                    <tr><td colspan="3">جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // 1. جلب البيانات فور تحميل الصفحة من السيرفر
        window.onload = function() {
    // دالة تشغيل فورية لتنفيذ الـ async بشكل سليم
    (async () => {
        console.log("بدء تحميل بيانات المريض...");
        try {
            // التأكد من أن الدوال موجودة قبل استدعائها
            if (typeof loadProfile === "function") {
                await loadProfile();
            }
            if (typeof loadPatientHistory === "function") {
                await loadPatientHistory();
            }
        } catch (err) {
            console.error("عذراً، حدث خطأ أثناء جلب البيانات:", err);
        }
    })();
   };
// 2. التبديل بين العرض والتعديل
function toggleEdit(show) {
    const viewCard = document.getElementById('viewCard');
    const editCard = document.getElementById('editCard');

    if (show) {
        // ملء الحقول بالبيانات المعروضة حالياً
        document.getElementById('eName').value = document.getElementById('vName').innerText.trim();
        document.getElementById('eAge').value = parseInt(document.getElementById('vAge').innerText) || "";
        document.getElementById('eGender').value = document.getElementById('vGender').innerText.trim();
        document.getElementById('eDisease').value = document.getElementById('vDisease').innerText.trim();
        document.getElementById('eHospital').value = document.getElementById('vHospital').innerText.trim();

        viewCard.style.display = 'none';
        editCard.style.display = 'block';
    } else {
        viewCard.style.display = 'block';
        editCard.style.display = 'none';
    }
}

// 3. معاينة الصورة المختارة فورياً
document.getElementById('editImageUpload').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        // فحص حجم الصورة قبل الرفع (تنبيه المستخدم مبكراً)
        if (file.size > 2 * 1024 * 1024) { // إذا زادت عن 2 ميجا
            alert("⚠️ حجم الصورة كبير جداً، قد لا يتم حفظها. يرجى اختيار صورة أقل من 2 ميجابايت.");
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('editProfileImage');
            if (preview) preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});

// 4. دالة الحفظ المعدلة
async function saveProfile() {
    const saveBtn = document.querySelector('button[onclick="saveProfile()"]');
    const originalText = saveBtn.innerHTML;
    const patientId = localStorage.getItem("patientId");

    if (!patientId) {
        alert("عذراً، يجب تسجيل الدخول أولاً.");
        return;
    }

    try {
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
        saveBtn.disabled = true;

        if (typeof updateProfile === "function") {
            // ننتظر دالة التحديث
            await updateProfile();
            
            // في حال النجاح (أو نجاح البيانات النصية وفشل الصورة جزئياً)
            toggleEdit(false); 
        } else {
            throw new Error("دالة updateProfile غير موجودة في script.js");
        }
        
    } catch (error) {
        console.error("خطأ عملية الحفظ:", error);
        // تم نقل الـ alert إلى داخل دالة updateProfile في script.js ليكون أدق
    } finally {
        saveBtn.innerHTML = originalText;
        saveBtn.disabled = false;
    }
}
    </script>

</body>

</html>
